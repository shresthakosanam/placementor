<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - Placementor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Background Effects */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.625rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .user-info {
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-align: right;
        }

        .user-info strong {
            color: var(--text-primary);
            display: block;
            font-size: 1.125rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        .results {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .results.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Score Circle */
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .score-circle {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .score-circle svg {
            transform: rotate(-90deg);
        }

        .score-circle-bg {
            fill: none;
            stroke: var(--bg-card);
            stroke-width: 12;
        }

        .score-circle-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }

        .score-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .score-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50px;
            color: var(--danger);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .score-status.good {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        /* Score Breakdown */
        .breakdown-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .breakdown-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .breakdown-name {
            color: var(--text-secondary);
        }

        .breakdown-score {
            color: var(--text-primary);
            font-weight: 600;
        }

        .breakdown-bar {
            height: 8px;
            background: var(--bg-card);
            border-radius: 4px;
            overflow: hidden;
        }

        .breakdown-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
            width: 0%;
        }

        .breakdown-fill.red { background: var(--danger); }
        .breakdown-fill.yellow { background: var(--warning); }
        .breakdown-fill.green { background: var(--success); }

        /* Two Column Layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* Skills */
        .skills-section {
            margin-bottom: 1.5rem;
        }

        .skills-section:last-child {
            margin-bottom: 0;
        }

        .skills-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }

        .skills-title.have {
            color: var(--success);
        }

        .skills-title.need {
            color: var(--danger);
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .skill-tag {
            padding: 0.375rem 0.875rem;
            border-radius: 50px;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .skill-tag.have {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .skill-tag.need {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Projects */
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--accent-blue);
            transform: translateX(5px);
        }

        .project-card:last-child {
            margin-bottom: 0;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .project-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .project-desc {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .project-tag {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 0.25rem 0.625rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .difficulty {
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .difficulty.advanced {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .difficulty.intermediate {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .difficulty.beginner {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        /* Courses */
        .course-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .course-item:last-child {
            margin-bottom: 0;
        }

        .course-info h4 {
            font-size: 0.9375rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .course-info span {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .priority {
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .priority.high {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .priority.medium {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        /* Tips List */
        .tips-list {
            list-style: none;
        }

        .tips-list li {
            display: flex;
            align-items: start;
            gap: 0.75rem;
            margin-bottom: 0.875rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .tips-list li:last-child {
            margin-bottom: 0;
        }

        .tips-list i {
            color: var(--warning);
            margin-top: 0.25rem;
        }

        /* Experience Suggestions */
        .exp-list {
            list-style: none;
        }

        .exp-list li {
            display: flex;
            align-items: start;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .exp-list i {
            color: var(--accent-cyan);
            margin-top: 0.25rem;
        }

        /* Portfolio Status */
        .portfolio-alert {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--warning);
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .portfolio-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.6;
        }

        /* Roadmap */
        .roadmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .roadmap-card {
            background: var(--bg-card);
            border-left: 3px solid var(--accent-blue);
            border-radius: 0 0.75rem 0.75rem 0;
            padding: 1.25rem;
        }

        .roadmap-card:nth-child(2) { border-left-color: var(--success); }
        .roadmap-card:nth-child(3) { border-left-color: var(--warning); }
        .roadmap-card:nth-child(4) { border-left-color: var(--danger); }

        .roadmap-week {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-cyan);
            font-size: 0.8125rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .roadmap-title {
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .roadmap-tasks {
            list-style: none;
        }

        .roadmap-tasks li {
            display: flex;
            align-items: start;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            margin-bottom: 0.5rem;
        }

        .roadmap-tasks li::before {
            content: '•';
            color: var(--accent-blue);
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1rem;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
            .user-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Analysis
            </a>
            <div class="user-info">
                <strong id="resultUsername">Loading...</strong>
                <span id="resultRole">Analysis</span>
            </div>
        </div>

        <!-- Loading Section -->
        <div id="loadingSection" class="loading active">
            <div class="spinner"></div>
            <h3>Analyzing your profile...</h3>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">This may take a few moments</p>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="results">
            <!-- SVG Gradient Definition -->
            <svg width="0" height="0">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
                    </linearGradient>
                </defs>
            </svg>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="score-container">
                        <div class="score-circle">
                            <svg width="180" height="180">
                                <circle class="score-circle-bg" cx="90" cy="90" r="78"></circle>
                                <circle class="score-circle-progress" cx="90" cy="90" r="78" 
                                    stroke-dasharray="490" 
                                    stroke-dashoffset="490"
                                    id="scoreCircle"></circle>
                            </svg>
                            <div class="score-text">
                                <div class="score-value" id="totalScore">0%</div>
                                <div class="score-label">Readiness Score</div>
                            </div>
                        </div>
                        <div class="score-status" id="scoreStatus">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Analyzing...</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">Score Breakdown</h3>
                    <div class="breakdown-list">
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">Projects</span>
                                <span class="breakdown-score">0% (25%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill red" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">Skills</span>
                                <span class="breakdown-score">0% (20%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill red" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">DSA / Coding</span>
                                <span class="breakdown-score">0% (20%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill yellow" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">Resume Quality</span>
                                <span class="breakdown-score">0% (15%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill red" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">Experience</span>
                                <span class="breakdown-score">0% (10%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill red" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <div class="breakdown-header">
                                <span class="breakdown-name">Communication</span>
                                <span class="breakdown-score">0% (10%)</span>
                            </div>
                            <div class="breakdown-bar">
                                <div class="breakdown-fill green" style="width: 0%" data-width="0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content will be dynamically inserted here -->
            <div id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // Get data from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const analysisData = JSON.parse(urlParams.get('data') || '{}');

        // Dynamic server URL configuration
        const SERVER_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? `${window.location.protocol}//${window.location.hostname}:3000`
            : `${window.location.protocol}//${window.location.hostname}:3000`;

        console.log('Results page loaded with data:', analysisData);

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            if (analysisData.user) {
                displayResults(analysisData);
            } else {
                // If no data, fetch from server or show error
                showError('No analysis data found. Please go back and try again.');
            }
        });

        function displayResults(data) {
            // Update user info
            document.getElementById('resultUsername').textContent = data.user.github || 'User';
            document.getElementById('resultRole').textContent = data.user.role || 'Analysis';
            
            // Hide loading, show results
            document.getElementById('loadingSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
            
            // Animate score
            animateScore(data.totalScore || 0);
            
            // Update score breakdown
            updateScoreBreakdown(data.breakdown || []);
            
            // Update score status
            updateScoreStatus(data.totalScore || 0);
            
            // Generate dynamic content
            generateDynamicContent(data);
            
            // Update score circle
            const circle = document.getElementById('scoreCircle');
            const circumference = 2 * Math.PI * 78;
            const offset = circumference - ((data.totalScore || 0) / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function generateDynamicContent(data) {
            const content = data.recommendations || {};
            let html = '';

            // Skills Section
            if (data.skillGap) {
                html += `
                    <div class="two-col">
                        <div class="card">
                            <h3 class="card-title">Skill Gap Analysis</h3>
                            
                            <div class="skills-section">
                                <div class="skills-title have">
                                    <i class="fas fa-check-circle"></i>
                                    Skills You Have
                                </div>
                                <div class="skills-list">
                                    ${(data.skillGap.have || []).map(skill => 
                                        `<span class="skill-tag have">${skill}</span>`
                                    ).join('')}
                                </div>
                            </div>

                            <div class="skills-section">
                                <div class="skills-title need">
                                    <i class="fas fa-exclamation-triangle"></i>
                                    Skills to Learn
                                </div>
                                <div class="skills-list">
                                    ${(data.skillGap.need || []).map(skill => 
                                        `<span class="skill-tag need">${skill}</span>`
                                    ).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <h3 class="card-title">
                                <i class="fas fa-rocket" style="color: var(--accent-cyan);"></i>
                                Recommended Projects
                            </h3>
                            
                            ${(content.projects || []).map(project => `
                                <div class="project-card">
                                    <div class="project-header">
                                        <div>
                                            <div class="project-name">${project.name}</div>
                                            <div class="project-desc">${project.description}</div>
                                        </div>
                                        <span class="difficulty ${project.difficulty}">${project.difficulty}</span>
                                    </div>
                                    <div class="project-tags">
                                        ${(project.tags || []).map(tag => `<span class="project-tag">${tag}</span>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Courses and Tips Section
            html += `
                <div class="two-col">
                    <div class="card">
                        <h3 class="card-title">
                            <i class="fas fa-book-open" style="color: var(--accent-blue);"></i>
                            Suggested Courses
                        </h3>
                        
                        ${(content.courses || []).map(course => `
                            <div class="course-item">
                                <div class="course-info">
                                    <h4>${course.name}</h4>
                                    <span>${course.category}</span>
                                </div>
                                <span class="priority ${course.priority}">${course.priority} priority</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="card">
                        <h3 class="card-title">
                            <i class="fas fa-file-alt" style="color: var(--accent-purple);"></i>
                            Resume Improvement Tips
                        </h3>
                        
                        <ul class="tips-list">
                            ${(content.resumeTips || []).map(tip => `
                                <li>
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span>${tip}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;

            // Experience and Portfolio Section
            html += `
                <div class="two-col">
                    <div class="card">
                        <h3 class="card-title">
                            <i class="fas fa-briefcase" style="color: var(--success);"></i>
                            Experience Suggestions
                        </h3>
                        
                        <ul class="exp-list">
                            ${(content.experience || []).map(suggestion => `
                                <li>
                                    <i class="fas fa-arrow-right"></i>
                                    <span>${suggestion}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <div class="card">
                        <h3 class="card-title">
                            <i class="fas fa-globe" style="color: var(--accent-cyan);"></i>
                            Portfolio Status
                        </h3>
                        
                        <div class="portfolio-alert">
                            <i class="fas fa-${content.portfolio?.alert?.includes('good') ? 'check-circle' : 'exclamation-triangle'}"></i>
                            <span>${content.portfolio?.alert || 'Portfolio needs attention'}</span>
                        </div>
                        <p class="portfolio-text">
                            ${content.portfolio?.message || 'Build a personal portfolio website to showcase your projects.'}
                        </p>
                    </div>
                </div>
            `;

            // Roadmap Section
            if (data.roadmap) {
                html += `
                    <div class="card">
                        <h3 class="card-title">
                            <i class="fas fa-map-marked-alt" style="color: var(--accent-purple);"></i>
                            Personalized Roadmap
                        </h3>
                        
                        <div class="roadmap-grid">
                            ${data.roadmap.map((week, index) => `
                                <div class="roadmap-card">
                                    <div class="roadmap-week">
                                        <i class="fas fa-${['book', 'code', 'file-alt', 'briefcase'][index] || 'book'}"></i>
                                        ${week.week}
                                    </div>
                                    <div class="roadmap-title">${week.title}</div>
                                    <ul class="roadmap-tasks">
                                        ${(week.tasks || []).map(task => `<li>${task}</li>`).join('')}
                                    </ul>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            document.getElementById('dynamicContent').innerHTML = html;
        }

        function updateScoreBreakdown(breakdown) {
            breakdown.forEach((item, index) => {
                const breakdownItem = document.querySelectorAll('.breakdown-item')[index];
                if (breakdownItem) {
                    const scoreElement = breakdownItem.querySelector('.breakdown-score');
                    const fillElement = breakdownItem.querySelector('.breakdown-fill');
                    
                    scoreElement.textContent = `${item.score}% (${item.weight}%)`;
                    fillElement.setAttribute('data-width', `${item.score}%`);
                    
                    // Set color based on score
                    fillElement.className = 'breakdown-fill';
                    if (item.score >= 70) {
                        fillElement.classList.add('green');
                    } else if (item.score >= 40) {
                        fillElement.classList.add('yellow');
                    } else {
                        fillElement.classList.add('red');
                    }
                }
            });
            
            // Animate progress bars
            setTimeout(() => {
                document.querySelectorAll('.breakdown-fill').forEach(fill => {
                    fill.style.width = fill.getAttribute('data-width');
                });
            }, 100);
        }

        function updateScoreStatus(score) {
            const statusElement = document.getElementById('scoreStatus');
            let status, icon, className;
            
            if (score >= 80) {
                status = 'Excellent';
                icon = 'fas fa-check-circle';
                className = 'good';
            } else if (score >= 60) {
                status = 'Good';
                icon = 'fas fa-thumbs-up';
                className = 'good';
            } else if (score >= 40) {
                status = 'Needs Improvement';
                icon = 'fas fa-exclamation-triangle';
                className = '';
            } else {
                status = 'Poor';
                icon = 'fas fa-times-circle';
                className = '';
            }
            
            statusElement.className = `score-status ${className}`;
            statusElement.innerHTML = `<i class="${icon}"></i><span>${status}</span>`;
        }

        function animateScore(target) {
            let current = 0;
            const element = document.getElementById('totalScore');
            const increment = target / 50;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current) + '%';
            }, 20);
        }

        function showError(message) {
            document.getElementById('loadingSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('dynamicContent').innerHTML = `
                <div class="card">
                    <h3 class="card-title" style="color: var(--danger);">
                        <i class="fas fa-exclamation-triangle"></i>
                        Error
                    </h3>
                    <p style="color: var(--text-secondary);">${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
